services:
  postgres:
    image: postgres:17
    container_name: ticket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: $POSTGRES_DB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.8
    container_name: ticket-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs
      - DEFAULT_REGION=us-east-1
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  queues-init:
    image: amazon/aws-cli
    container_name: ticket-queues-init
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: >
      /bin/sh -c "
        aws --endpoint-url http://localstack:4566 sqs create-queue --queue-name ticket-processing-dlq &&
        aws --endpoint-url http://localstack:4566 sqs create-queue --queue-name ticket-processing-queue --attributes '{\"RedrivePolicy\":\"{\\\"deadLetterTargetArn\\\":\\\"arn:aws:sqs:us-east-1:000000000000:ticket-processing-dlq\\\",\\\"maxReceiveCount\\\":\\\"3\\\"}\"}' &&
        aws --endpoint-url http://localstack:4566 sqs set-queue-attributes --queue-url http://localstack:4566/000000000000/ticket-processing-dlq --attributes VisibilityTimeout=5 &&
        aws --endpoint-url http://localstack:4566 sqs set-queue-attributes --queue-url http://localstack:4566/000000000000/ticket-processing-queue --attributes VisibilityTimeout=5 &&
        aws --endpoint-url http://localstack:4566 sqs create-queue --queue-name ticket-processing-dlq-test &&
        aws --endpoint-url http://localstack:4566 sqs create-queue --queue-name ticket-processing-queue-test --attributes '{\"RedrivePolicy\":\"{\\\"deadLetterTargetArn\\\":\\\"arn:aws:sqs:us-east-1:000000000000:ticket-processing-dlq-test\\\",\\\"maxReceiveCount\\\":\\\"3\\\"}\"}' &&
        aws --endpoint-url http://localstack:4566 sqs set-queue-attributes --queue-url http://localstack:4566/000000000000/ticket-processing-dlq-test --attributes VisibilityTimeout=5 &&
        aws --endpoint-url http://localstack:4566 sqs set-queue-attributes --queue-url http://localstack:4566/000000000000/ticket-processing-queue-test --attributes VisibilityTimeout=5 &&
        echo 'Queues created.'
      "
    restart: "no"

volumes:
  postgres_data:
